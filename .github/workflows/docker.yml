name: CardServer

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-22.04-arm

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io/bhuism/cardserver
          username: bhuism
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/bhuism/api
            ghcr.io/bhuism/couchbase2redis
            ghcr.io/bhuism/stream
            ghcr.io/bhuism/gameengine
            ghcr.io/bhuism/aiplayer
            ghcr.io/bhuism/admin

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build image
        run: |
          mvn -B -ntp -T 1C clean install org.apache.maven.plugins:maven-checkstyle-plugin:check com.github.spotbugs:spotbugs-maven-plugin:check spring-boot:build-image

      - name: Push
        id: push
        if: success() && github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/bhuism/stream:latest
          docker push ghcr.io/bhuism/couchbase2redis:latest
          docker push ghcr.io/bhuism/api:latest
          docker push ghcr.io/bhuism/gameengine:latest
          docker push ghcr.io/bhuism/aiplayer:latest
          docker push ghcr.io/bhuism/admin:latest

  rollout-restart:
    name: Rollout Restart
    needs: build
    if: success() && github.event_name != 'pull_request'
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Rollout Restart Deployments
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n cardserver rollout restart deployment cardserver-api cardserver-couchbase2redis cardserver-stream cardserver-gameengine cardserver-aiplayer cardserver-admin
