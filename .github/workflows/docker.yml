name: CardServer

on:
  push:
    branches: [ "development", "sinks-many" ]
  pull_request:
    branches: [ "development" ]

jobs:

  build:
    #runs-on: buildjet-2vcpu-ubuntu-2204-arm
    runs-on: ubuntu-22.04-arm

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io/bhuism/cardserver
          username: bhuism
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/bhuism/cardserver

      - name: Setup Java
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build image
        run: |
          mvn -ntp -B -Dspring-boot.build-image.imageName=ghcr.io/bhuism/cardserver:latest clean install org.apache.maven.plugins:maven-checkstyle-plugin:check com.github.spotbugs:spotbugs-maven-plugin:check spring-boot:build-image

      - name: Push
        id: push
        if: success() && github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/bhuism/cardserver:latest

  rollout-restart:
    name: Rollout Restart
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04-arm
    steps:

      - name: Rollout Restart Deployment
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n cardserver rollout restart deployment cardserver
