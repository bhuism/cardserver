name: CardServer

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-22.04-arm
    outputs:
      common: ${{ steps.changes.outputs.common }}
      api: ${{ steps.changes.outputs.api }}
      couchbase2redis: ${{ steps.changes.outputs.couchbase2redis }}
      stream: ${{ steps.changes.outputs.stream }}
      gameengine: ${{ steps.changes.outputs.gameengine }}
      aiplayer: ${{ steps.changes.outputs.aiplayer }}
      admin: ${{ steps.changes.outputs.admin }}

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io/bhuism/cardserver
          username: bhuism
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/bhuism/api
            ghcr.io/bhuism/couchbase2redis
            ghcr.io/bhuism/stream
            ghcr.io/bhuism/gameengine
            ghcr.io/bhuism/aiplayer
            ghcr.io/bhuism/admin

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api: 'api/**'
            couchbase2redis: 'couchbase2redis/**'
            stream: 'stream/**'
            gameengine: 'gameengine/**'
            aiplayer: 'aiplayer/**'
            admin: 'admin/**'
            common:
              - 'pom.xml'
              - 'converters/**'
              - 'couchbase/**'
              - 'openapi/**'
              - 'utils/**'

      - name: Build image
        run: |
          PL_ARGS=""
          if [ "${{ steps.changes.outputs.common }}" == "true" ]; then
            PL_ARGS="api,couchbase2redis,stream,gameengine,aiplayer,admin"
          else
            [ "${{ steps.changes.outputs.api }}" == "true" ] && PL_ARGS="${PL_ARGS}api,"
            [ "${{ steps.changes.outputs.couchbase2redis }}" == "true" ] && PL_ARGS="${PL_ARGS}couchbase2redis,"
            [ "${{ steps.changes.outputs.stream }}" == "true" ] && PL_ARGS="${PL_ARGS}stream,"
            [ "${{ steps.changes.outputs.gameengine }}" == "true" ] && PL_ARGS="${PL_ARGS}gameengine,"
            [ "${{ steps.changes.outputs.aiplayer }}" == "true" ] && PL_ARGS="${PL_ARGS}aiplayer,"
            [ "${{ steps.changes.outputs.admin }}" == "true" ] && PL_ARGS="${PL_ARGS}admin,"
            PL_ARGS="${PL_ARGS%,}"
          fi
          
          if [ -n "$PL_ARGS" ]; then
            mvn -B -ntp -T 1C clean install org.apache.maven.plugins:maven-checkstyle-plugin:check com.github.spotbugs:spotbugs-maven-plugin:check spring-boot:build-image -pl $PL_ARGS -am
          else
            echo "No modules to build."
          fi

      - name: Push
        id: push
        if: success() && github.event_name != 'pull_request'
        run: |
          if [ "${{ steps.changes.outputs.common }}" == "true" ] || [ "${{ steps.changes.outputs.api }}" == "true" ]; then docker push ghcr.io/bhuism/api:latest; fi
          if [ "${{ steps.changes.outputs.common }}" == "true" ] || [ "${{ steps.changes.outputs.couchbase2redis }}" == "true" ]; then docker push ghcr.io/bhuism/couchbase2redis:latest; fi
          if [ "${{ steps.changes.outputs.common }}" == "true" ] || [ "${{ steps.changes.outputs.stream }}" == "true" ]; then docker push ghcr.io/bhuism/stream:latest; fi
          if [ "${{ steps.changes.outputs.common }}" == "true" ] || [ "${{ steps.changes.outputs.gameengine }}" == "true" ]; then docker push ghcr.io/bhuism/gameengine:latest; fi
          if [ "${{ steps.changes.outputs.common }}" == "true" ] || [ "${{ steps.changes.outputs.aiplayer }}" == "true" ]; then docker push ghcr.io/bhuism/aiplayer:latest; fi
          if [ "${{ steps.changes.outputs.common }}" == "true" ] || [ "${{ steps.changes.outputs.admin }}" == "true" ]; then docker push ghcr.io/bhuism/admin:latest; fi

  rollout-restart:
    name: Rollout Restart
    needs: build
    if: success() && github.event_name != 'pull_request'
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Determine Deployments
        id: deps
        run: |
          DEPS=""
          [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.api }}" == "true" ] && DEPS="${DEPS}cardserver-api "
          [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.couchbase2redis }}" == "true" ] && DEPS="${DEPS}cardserver-couchbase2redis "
          [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.stream }}" == "true" ] && DEPS="${DEPS}cardserver-stream "
          [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.gameengine }}" == "true" ] && DEPS="${DEPS}cardserver-gameengine "
          [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.aiplayer }}" == "true" ] && DEPS="${DEPS}cardserver-aiplayer "
          [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.admin }}" == "true" ] && DEPS="${DEPS}cardserver-admin "
          DEPS=$(echo "$DEPS" | xargs)
          echo "deployments=${DEPS}" >> $GITHUB_OUTPUT

      - name: Rollout Restart Deployments
        if: steps.deps.outputs.deployments != ''
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n cardserver rollout restart deployment ${{ steps.deps.outputs.deployments }}
