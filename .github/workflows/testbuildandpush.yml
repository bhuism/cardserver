name: CardServer

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build everything'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:

  build:
    runs-on: ubuntu-22.04-arm
    outputs:
      common: ${{ steps.flags.outputs.common }}
      api: ${{ steps.flags.outputs.api }}
      stream: ${{ steps.flags.outputs.stream }}
      gameengine: ${{ steps.flags.outputs.gameengine }}
      aiplayer: ${{ steps.flags.outputs.aiplayer }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io/bhuism/cardserver
          username: bhuism
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/bhuism/api
            ghcr.io/bhuism/stream
            ghcr.io/bhuism/gameengine
            ghcr.io/bhuism/aiplayer
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api: 'api/**'
            stream: 'stream/**'
            gameengine: 'gameengine/**'
            aiplayer: 'aiplayer/**'
            common:
              - 'pom.xml'
              - 'converters/**'
              - 'couchbase/**'
              - 'openapi/**'
              - 'utils/**'

      - name: Set flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.build_all }}" == "true" ]; then
            echo "common=true" >> $GITHUB_OUTPUT
            echo "api=true" >> $GITHUB_OUTPUT
            echo "stream=true" >> $GITHUB_OUTPUT
            echo "gameengine=true" >> $GITHUB_OUTPUT
            echo "aiplayer=true" >> $GITHUB_OUTPUT
          else
            echo "common=${{ steps.changes.outputs.common }}" >> $GITHUB_OUTPUT
            echo "api=${{ steps.changes.outputs.api }}" >> $GITHUB_OUTPUT
            echo "stream=${{ steps.changes.outputs.stream }}" >> $GITHUB_OUTPUT
            echo "gameengine=${{ steps.changes.outputs.gameengine }}" >> $GITHUB_OUTPUT
            echo "aiplayer=${{ steps.changes.outputs.aiplayer }}" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          PL_ARGS=""
          if [ "${{ steps.flags.outputs.common }}" == "true" ]; then
            PL_ARGS="api,stream,gameengine,aiplayer"
          else
            if [ "${{ steps.flags.outputs.api }}" == "true" ]; then PL_ARGS="${PL_ARGS}api,"; fi
            if [ "${{ steps.flags.outputs.stream }}" == "true" ]; then PL_ARGS="${PL_ARGS}stream,"; fi
            if [ "${{ steps.flags.outputs.gameengine }}" == "true" ]; then PL_ARGS="${PL_ARGS}gameengine,"; fi
            if [ "${{ steps.flags.outputs.aiplayer }}" == "true" ]; then PL_ARGS="${PL_ARGS}aiplayer,"; fi
            PL_ARGS="${PL_ARGS%,}"
          fi
          
          if [ -n "$PL_ARGS" ]; then
            mvn -B -ntp -T 1C clean install org.apache.maven.plugins:maven-checkstyle-plugin:check com.github.spotbugs:spotbugs-maven-plugin:check spring-boot:build-image -pl $PL_ARGS -am
          else
            echo "No modules to build."
          fi

      - name: Push
        id: push
        if: success() && github.event_name != 'pull_request'
        run: |
          if [ "${{ steps.flags.outputs.common }}" == "true" ] || [ "${{ steps.flags.outputs.api }}" == "true" ]; then docker push ghcr.io/bhuism/api:latest; fi
          if [ "${{ steps.flags.outputs.common }}" == "true" ] || [ "${{ steps.flags.outputs.stream }}" == "true" ]; then docker push ghcr.io/bhuism/stream:latest; fi
          if [ "${{ steps.flags.outputs.common }}" == "true" ] || [ "${{ steps.flags.outputs.gameengine }}" == "true" ]; then docker push ghcr.io/bhuism/gameengine:latest; fi
          if [ "${{ steps.flags.outputs.common }}" == "true" ] || [ "${{ steps.flags.outputs.aiplayer }}" == "true" ]; then docker push ghcr.io/bhuism/aiplayer:latest; fi
  rollout-restart:
    name: Rollout Restart
    needs: build
    if: success() && github.event_name != 'pull_request'
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Determine Deployments
        id: deps
        run: |
          DEPS=""
          if [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.api }}" == "true" ]; then DEPS="${DEPS}cardserver-api "; fi
          if [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.stream }}" == "true" ]; then DEPS="${DEPS}cardserver-stream "; fi
          if [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.gameengine }}" == "true" ]; then DEPS="${DEPS}cardserver-gameengine "; fi
          if [ "${{ needs.build.outputs.common }}" == "true" ] || [ "${{ needs.build.outputs.aiplayer }}" == "true" ]; then DEPS="${DEPS}cardserver-aiplayer "; fi
          DEPS=$(echo "$DEPS" | xargs)
          echo "deployments=${DEPS}" >> $GITHUB_OUTPUT

      - name: Rollout Restart Deployments
        if: steps.deps.outputs.deployments != ''
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n cardserver rollout restart deployment ${{ steps.deps.outputs.deployments }}