components:
  schemas:
    Game:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the test
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
        creator:
          type: string
        dealer:
          type: integer
          minimum: 0
          maximum: 3
        playerCard:
          type: array
          items:
            type: object
            properties:
              card:
                $ref: '#/components/schemas/Card'
              player:
                type: integer
                minimum: 0
                maximum: 3
            required:
              - card
              - player
        #        elder:
        #          type: integer
        #          minimum: 0
        #          maximum: 3
        says:
          type: object
          additionalProperties:
            type: boolean
        players:
          type: array
          minItems: 0
          maxItems: 4
          items:
            type: string
        turns:
          type: array
          items:
            $ref: "#/components/schemas/Card"
          minItems: 0
          maxItems: 32
        trump:
          $ref: '#/components/schemas/Suit'
        whosTurn:
          type: integer
        whoSay:
          type: integer
        lastTrickOpen:
          type: boolean
        variant:
          $ref: './api.yaml#/components/schemas/GameVariant'
        dealCounter:
          type: integer
        numberOfTurns:
          type: integer
        isCompleted:
          type: boolean
        hasFullTrick:
          type: boolean
        tricksPlayed:
          type: integer
        iedereenPast:
          type: boolean
        niemandGezegd:
          type: boolean
        geenKaartGespeeld:
          type: boolean
        huidigeTafelKaarten:
          type: array
          items:
            $ref: "#/components/schemas/Card"
        trickPoints:
          type: array
          items:
            $ref: "#/components/schemas/NorthSouthNumber"
        allPoints:
          $ref: "#/components/schemas/NorthSouthNumber"
        trickRoem:
          type: array
          items:
            $ref: "#/components/schemas/NorthSouthNumber"
        allRoem:
          $ref: "#/components/schemas/NorthSouthNumber"
        winner:
          $ref: "#/components/schemas/Teams"
        erIsGegaan:
          type: boolean
        elder:
          type: integer
        elderTeam:
          $ref: "#/components/schemas/Teams"
        trickWinnerPlayer:
          type: array
          items:
            type: integer
        trickWinnerCard:
          type: array
          items:
            $ref: "#/components/schemas/Card"
        playerPoints:
          type: array
          items:
            type: integer
        heeftGepast:
          type: array
          items:
            type: integer
        roemGeklopt:
          type: array
          items:
            type: integer
            uniqueItems: true
      required:
        - id
        - trump
        - created
        - updated
        - creator
        - dealer
        - playerCard
        - ended
        - players
        - turns
        - trump
        - lastTrickOpen
        - variant
        - dealCounter
        - numberOfTurns
        - isCompleted
        - hasFullTrick
        - tricksPlayed
        - iedereenPast
        - niemandGezegd
        - geenKaartGespeeld
        - huidigeTafelKaarten
        - trickPoints
        - allPoints
        - trickRoem
        - allRoem
        - erIsGegaan
        - trickWinnerPlayer
        - trickWinnerCard
        - playerPoints
        - heeftGepast
        - roemGeklopt
    Suit:
      type: string
      enum:
        - Clubs
        - Diamonds
        - Hearts
        - Spades
    Teams:
      type: string
      enum:
        - NothSouth
        - EastWest
    NorthSouthNumber:
      type: object
      properties:
        northSouth:
          type: integer
          default: 0
        eastWest:
          type: integer
          default: 0
      required:
        - northSouth
        - eastWest
    Card:
      type: string
      enum:
        - Ah
        - Kh
        - Qh
        - Jh
        - Th
        - Nh
        - Eh
        - Sh
        - Ac
        - Kc
        - Qc
        - Jc
        - Tc
        - Nc
        - Ec
        - Sc
        - Ad
        - Kd
        - Qd
        - Jd
        - Td
        - Nd
        - Ed
        - Sd
        - As
        - Ks
        - Qs
        - Js
        - Ts
        - Ns
        - Es
        - Ss
