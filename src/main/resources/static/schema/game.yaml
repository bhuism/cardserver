components:
  schemas:
    Game:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the test
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
        creator:
          type: string
        dealer:
          type: integer
          minimum: 0
          maximum: 3
        playerCard:
          type: array
#          uniqueItems: true
          items:
            type: object
            properties:
              card:
                $ref: '#/components/schemas/Card'
              player:
                type: integer
                minimum: 0
                maximum: 3
            required:
              - card
              - player
            minItems: 0
            maxItems: 32
        elder:
          type: integer
          minimum: 0
          maximum: 3
        ended:
          type: boolean
          default: "false"
        players:
          type: array
          items:
            type: string
#          uniqueItems: true
          minItems: 1
          maxItems: 4
        turns:
          type: array
#          uniqueItems: true
          items:
            $ref: "#/components/schemas/Card"
          minItems: 0
          maxItems: 32
        trump:
          $ref: '#/components/schemas/Suit'
      required:
        - id
        - trump
        - created
        - updated
        - creator
        - dealer
        - playerCard
        - ended
        - players
        - turns
    Suit:
      type: string
      enum:
        - Clubs
        - Diamonds
        - Hearts
        - Spades
    CardNr:
      type: string
      enum:
        - Ace
        - King
        - Queen
        - Jack
        - Ten
        - Nine
        - Eight
        - Seven
    Card:
      type: object
      properties:
        card:
          $ref: '#/components/schemas/CardNr'
        color:
          $ref: '#/components/schemas/Suit'
      required:
        - color
        - card
