components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        updated:
          type: string
          format: date-time
        displayName:
          type: string
        photoURL:
          type: string
        online:
          type: boolean
        skipAnimation:
          type: boolean
        gameVariant:
          $ref: "./api.yaml#/components/schemas/GameVariant"
        screenOrientation:
          $ref: "./api.yaml#/components/schemas/ScreenOrientation"
        theme:
          $ref: "./api.yaml#/components/schemas/Theme"
      required:
        - id
        - updated
        - displayName
        - photoURL
        - online
        - skipAnimation
        - gameVariant
        - screenOrientation
        - theme
