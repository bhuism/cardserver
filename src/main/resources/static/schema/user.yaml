components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        updated:
          type: string
          format: date-time
        displayName:
          type: string
        photoURL:
          type: string
        online:
          type: boolean
        skipAnimation:
          type: boolean
      required:
        - id
        - updated
        - displayName
        - photoURL
        - online
        - skipAnimation

