openapi: "3.0.4"
info:
  title: Klavers JAssen
  description: Klavers JAssen
  version: 1.0.0
servers:
  - url: 'https://www.klaversjassen.nl/api/v1'
    description: Klavers Jassen

paths:
  /login:
    post:
      operationId: login
      requestBody:
        $ref: '#/components/requestBodies/LoginRequest'
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
      tags:
        - Login

  /games:
    get:
      operationId: getGames
      responses:
        "200":
          $ref: "#/components/responses/GamesResponse"
      tags:
        - Game
  /game/{gameId}:
    get:
      operationId: getGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
      tags:
        - Game
components:
  schemas:
    loginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        providerId:
          type: string
      required:
        - email
        - providerId
    loginResponse:
      type: object
      properties:
        uid:
          type: string
      required:
        - uid
  parameters:
    gameId:
      name: gameId
      in: path
      schema:
        type: string
      required: true
  securitySchemes:
    openId:
      type: openIdConnect
      scheme: bearer
      bearerFormat: JWT
      openIdConnectUrl: https://accounts.google.com/.well-known/openid-configuration
  requestBodies:
    LoginRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/loginRequest'
  responses:
    GameResponse:
      description: fetch a game
      content:
        application/json:
          schema:
            $ref: "./game.yaml#/components/schemas/Game"
    GamesResponse:
      description: fetch all games
      content:
        application/json:
          schema:
            type: array
            items:
              type: string
            uniqueItems: true
    LoginResponse:
      description: login response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/loginResponse"
security:
  - bearerAuth:
      - openid
      - profile
      - email
