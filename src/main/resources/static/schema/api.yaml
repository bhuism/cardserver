openapi: "3.0.4"
info:
  title: Klavers Jassen
  description: Klavers Jassen
  version: "@git.commit.id.abbrev@"
servers:
  - url: 'https://api.klaversjassen.nl/api/v1'
    description: Klavers Jassen
  - url: 'https://api.klaversjassen.nl'
    description: Klavers Jassen Root

paths:
  /feedback:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
              required:
                - message
      responses:
        "200":
          description: ok
  /boom:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      operationId: getBooms
      responses:
        "200":
          description: BoomsResponse
          $ref: "#/components/responses/BoomsResponse"
    post:
      operationId: createBoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoom"
      responses:
        "200":
          description: Boomresponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boom"
  /boom/{boomId}/play:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: playBoom
      parameters:
        - $ref: "#/components/parameters/boomId"
      responses:
        "200":
          description: a boom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
  /boom/{boomId}:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      operationId: getBoom
      parameters:
        - $ref: "#/components/parameters/boomId"
      responses:
        "200":
          description: a boom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boom"
        '404':
          description: Todo item not found.
    delete:
      operationId: deleteBoom
      parameters:
        - $ref: "#/components/parameters/boomId"
      responses:
        "200":
          description: ok
  /debug/sseconnections/get:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      tags:
        - debug
      operationId: getDebugSseConnections
      responses:
        "200":
          $ref: "#/components/responses/SseConnectionsResponse"
  /debug/sseconnections/{sessionIdentifier}:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    delete:
      tags:
        - debug
      parameters:
        - $ref: "#/components/parameters/sessionIdentifier"
      operationId: deleteSseSession
      responses:
        "200":
          description: ok
  /login:
    post:
      tags:
        - login
      operationId: login
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
  /rotateJwt:
    post:
      operationId: rotateJwt
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
  /loadUser:
    post:
      operationId: loadUser
      responses:
        "200":
          $ref: "#/components/responses/LoadUserResponse"
  /games/{gameId}/say:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: say
      parameters:
        - $ref: "#/components/parameters/gameId"
      requestBody:
        $ref: "#/components/requestBodies/sayRequest"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/claimRoem:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: claimRoem
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/claimVerzaken:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: claimVerzaken
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/openLastTrick:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: openLastTrick
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/closeLastTrick:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: closeLastTrick
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/playCard:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: playCard
      parameters:
        - $ref: "#/components/parameters/gameId"
      requestBody:
        $ref: "#/components/requestBodies/playCard"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/kickAi:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: kickAi
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      operationId: getGames
      parameters:
        - name: boom
          in: query
          schema:
            type: boolean
        - name: finished
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/GamesResponse"
    post:
      operationId: createGame
      requestBody:
        description: A new game
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createGame"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
        "404":
          description: not found
  /games/{gameId}:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      operationId: getGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
        "404":
          description: not found
    delete:
      operationId: deleteGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
  /users/multiple/{userIds}:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      operationId: getUserByIds
      parameters:
        - $ref: "#/components/parameters/multipleUserId"
      responses:
        "200":
          $ref: "#/components/responses/UsersResponse"
  /ping:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: ping
      responses:
        "200":
          description: ok
  /pong:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: pong
      responses:
        "200":
          description: ok
  /users/updatePreferences:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: updatePreferences
      requestBody:
        $ref: "#/components/requestBodies/updatePreferences"
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
  /users/single/{userId}:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
        "404":
          description: not found
  /users/invites:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    get:
      operationId: getInvites
      responses:
        "200":
          $ref: "#/components/responses/InvitesResponse"
    post:
      operationId: createInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createInvite"
      responses:
        "200":
          $ref: "#/components/responses/CreateInvitesResponse"
        "404":
          description: not found
  /users/invites/{userId}:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    delete:
      operationId: removeInvite
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: ok
        "404":
          description: not found
    post:
      operationId: acceptInvite
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: ok
        "404":
          description: not found
  /users/message:
    parameters:
      - $ref: "#/components/parameters/AppIdentifier"
    post:
      operationId: usersMessage
      requestBody:
        $ref: "#/components/requestBodies/postMessage"
      responses:
        "200":
          description: ok
