  parameters:
    gameId:
      name: gameId
      in: path
      schema:
        type: string
      required: true
    userId:
      name: userId
      in: path
      schema:
        type: string
      required: true
  securitySchemes:
    openId:
      type: openIdConnect
      scheme: bearer
      bearerFormat: JWT
      openIdConnectUrl: https://accounts.google.com/.well-known/openid-configuration
#  requestBodies:
#    LoginRequest:
#      required: true
#      content:
#        application/json:
#          schema:
#            $ref: '#/components/schemas/loginRequest'
  responses:
    GameResponse:
      description: fetch a game
      content:
        application/json:
          schema:
            $ref: "./game.yaml#/components/schemas/Game"
    UserResponse:
      description: fetch a game
      content:
        application/json:
          schema:
            $ref: "./user.yaml#/components/schemas/User"
    GamesResponse:
      description: fetch all games
      content:
        application/json:
          schema:
            type: array
            items:
              type: string
            uniqueItems: true
#    LoginResponse:
#      description: login response
#      content:
#        application/json:
#          schema:
#            $ref: "#/components/schemas/loginResponse"
security:
  - bearerAuth:
      - openid
      - profile
      - email
