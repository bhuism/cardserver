openapi: "3.0.4"
info:
  title: Klavers Jassen
  description: Klavers Jassen
  version: "@git.commit.id.abbrev@"
servers:
  - url: 'https://www.klaversjassen.nl/api/v1'
    description: Klavers Jassen

paths:
  /whoami:
    post:
      tags:
        - whoami
      operationId: whoami
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
  /games/{gameId}/playCard:
    post:
      operationId: playCard
      parameters:
        - $ref: "#/components/parameters/gameId"
      requestBody:
        $ref: "#/components/requestBodies/playCard"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
        "404":
          description: not found
  /games:
    get:
      operationId: getGames
      responses:
        "200":
          $ref: "#/components/responses/GamesResponse"
    post:
      operationId: createGame
      requestBody:
        description: A new game
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createGame"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
        "404":
          description: not found
  /games/{gameId}:
    get:
      operationId: getGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
        "404":
          description: not found
    delete:
      operationId: deleteGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
  /users/multiple/{userIds}:
    get:
      operationId: getUsers
      parameters:
        - $ref: "#/components/parameters/multipleUserId"
      responses:
        "200":
          $ref: "#/components/responses/UsersResponse"
  /users/ping:
    post:
      operationId: ping
      requestBody:
        $ref: "#/components/requestBodies/uuid"
      responses:
        "200":
          $ref: "#/components/responses/uuid"
  /users/pong:
    post:
      operationId: pong
      requestBody:
        $ref: "#/components/requestBodies/uuid"
      responses:
        "200":
          $ref: "#/components/responses/uuid"
  /users/message:
    post:
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/postMessage"
      responses:
        "200":
          description: ok
  /users/incomingInvites:
    get:
      operationId: getIncomingInvites
      responses:
        "200":
          $ref: "#/components/responses/IncomingInvitesResponse"
  /users/single/{userId}:
    get:
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
        "404":
          description: not found
  /users/invites/{userId}:
    delete:
      operationId: removeInvite
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
        "404":
          description: not found
components:
  requestBodies:
    playCard:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/playCard"
    uuid:
      required: true
      content:
        application/json:
          schema:
            type: string
            format: uuid
  schemas:
    playCard:
      type: object
      properties:
        card:
          $ref: "./game.yaml#/components/schemas/Card"
      required:
        - card
    postMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    createGame:
      type: object
      properties:
        players:
          type: array
          uniqueItems: true
          minItems: 4
          maxItems: 4
          items:
            type: string
      required:
        - players
  parameters:
    gameId:
      name: gameId
      in: path
      schema:
        type: string
      required: true
    userId:
      name: userId
      in: path
      schema:
        type: string
      required: true
    multipleUserId:
      name: userIds
      in: path
      schema:
        type: array
        items:
          type: string
      required: true
  securitySchemes:
    openId:
      type: openIdConnect
      scheme: bearer
      bearerFormat: JWT
      openIdConnectUrl: https://accounts.google.com/.well-known/openid-configuration
  responses:
    uuid:
      description: a game
      content:
        application/json:
          schema:
            type: string
            format: uuid
    GameResponse:
      description: a game
      content:
        application/json:
          schema:
            $ref: "./game.yaml#/components/schemas/Game"
    UserResponse:
      description: a user
      content:
        application/json:
          schema:
            $ref: "./user.yaml#/components/schemas/User"
    GamesResponse:
      description: all games
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "./game.yaml#/components/schemas/Game"
    UsersResponse:
      description: users
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "./user.yaml#/components/schemas/User"
    LoginResponse:
      description: login response
      content:
        application/json:
          schema:
            type: object
            properties:
              jwt:
                type: string
                format: password
              user:
                $ref: './user.yaml/#/components/schemas/User'
            required:
              - jwt
              - user
    IncomingInvitesResponse:
      description: incoming invites response
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "./user.yaml#/components/schemas/User"
security:
  - bearerAuth:
      - openid
      - profile
      - email
