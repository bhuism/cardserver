  /games:
    get:
      operationId: getGames
      responses:
        "200":
          $ref: "#/components/responses/GamesResponse"
      tags:
        - Game
  /games/{gameId}:
    get:
      operationId: getGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
      tags:
        - Game
  /users/{userId}:
    get:
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
      tags:
        - Game
components:
#  schemas:
#    loginRequest:
#      type: object
#      properties:
#        email:
#          type: string
#          format: email
#        providerId:
#          type: string
#        name:
