server:
  tomcat:
    accesslog:
      enabled: true
  port: 8080
  shutdown: immediate
logging:
  level:
    ROOT: info
#    org.springframework: trace
    nl.appsource: debug
management:
  endpoints:
    web:
      exposure:
        include: '*'
spring:
  web:
    error:
      whitelabel:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
          jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs

