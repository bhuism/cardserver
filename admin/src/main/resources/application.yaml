server:
  port: 8085
spring:
  security:
    user:
      name: root
      password: killer
  boot:
    admin:
      context-path: /admin
management:
  endpoint:
    env:
      show-values: always
    info:
      access: read_only
    health:
      access: read_only
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: '*'
  server:
    port: 9085
    ssl:
      enabled: false
    add-application-context-header: true
