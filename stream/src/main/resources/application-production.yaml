spring:
  data:
    redis:
      host: redis-stack.redis-stack.svc.cluster.local
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "https://api.klaversjassen.nl"
  boot:
    admin:
      client:
        url: http://cardserver-admin.cardserver:8085/admin
        instance:
          service-base-url: http://cardserver-stream.cardserver:8082
          management-base-url: http://cardserver-stream.cardserver:9082

cardserver:
  couchbase:
    connection-string: couchbase://couchbase.couchbase.svc.cluster.local
    username: root
    password: killer
    bucket-name: cardserver

logging:
  level:
    ROOT: info
    nl.appsource: debug
