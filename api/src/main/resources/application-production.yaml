spring:
  data:
    redis:
      host: redis-stack.redis-stack.svc.cluster.local
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.impl.nl/realms/klaversjassen
server:
  port: 8080

logging:
  level:
    ROOT: info
    com:
      couchbase: warn

cardserver:
  couchbase:
    connection-string: couchbase://couchbase.couchbase.svc.cluster.local
    username: root
    password: killer
    bucket-name: cardserver

management:
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://jaeger.jaeger:4318/v1/traces
  otlp:
    metrics:
      export:
        enabled: false
  logging:
    export:
      enabled: false
