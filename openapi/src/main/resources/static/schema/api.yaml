openapi: "3.0.4"
info:
  title: Klavers Jassen
  description: Klavers Jassen
  version: "@git.commit.id.abbrev@"
servers:
  - url: 'https://api.klaversjassen.nl/api/v1'
    description: Klavers Jassen
  - url: 'https://api.klaversjassen.nl'
    description: Klavers Jassen Root

paths:
  /feedback:
    post:
      operationId: feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
              required:
                - message
      responses:
        "200":
          description: ok
  /boom:
    get:
      operationId: getBooms
      responses:
        "200":
          $ref: "#/components/responses/BoomsResponse"
    post:
      operationId: createBoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoom"
      responses:
        "200":
          description: Boomresponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boom"
  /boom/{boomId}/play:
    post:
      operationId: playBoom
      parameters:
        - $ref: "#/components/parameters/boomId"
      responses:
        "200":
          description: a boom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
  /boom/{boomId}:
    get:
      operationId: getBoom
      parameters:
        - $ref: "#/components/parameters/boomId"
      responses:
        "200":
          description: a boom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boom"
        '404':
          description: Todo item not found.
  /debug/sseconnections/get:
    get:
      tags:
        - debug
      operationId: getDebugSseConnections
      responses:
        "200":
          $ref: "#/components/responses/SseConnectionsResponse"
  /debug/sseconnections/{sessionIdentifier}:
    delete:
      tags:
        - debug
      parameters:
        - $ref: "#/components/parameters/sessionIdentifier"
      operationId: deleteSseSession
      responses:
        "200":
          description: ok
  /login:
    post:
      tags:
        - login
      operationId: login
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
  /rotateJwt:
    post:
      operationId: rotateJwt
      responses:
        "200":
          $ref: "#/components/responses/LoginResponse"
  /loadUser:
    post:
      operationId: loadUser
      responses:
        "200":
          $ref: "#/components/responses/LoadUserResponse"
  /games/{gameId}/say:
    post:
      operationId: say
      parameters:
        - $ref: "#/components/parameters/gameId"
      requestBody:
        $ref: "#/components/requestBodies/sayRequest"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/claimRoem:
    post:
      operationId: claimRoem
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/claimVerzaken:
    post:
      operationId: claimVerzaken
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/openLastTrick:
    post:
      operationId: openLastTrick
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/closeLastTrick:
    post:
      operationId: closeLastTrick
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/playCard:
    post:
      operationId: playCard
      parameters:
        - $ref: "#/components/parameters/gameId"
      requestBody:
        $ref: "#/components/requestBodies/card"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games/{gameId}/kickAi:
    post:
      operationId: kickAi
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found
  /games:
    get:
      operationId: getGames
      parameters:
        - name: boom
          in: query
          schema:
            type: boolean
        - name: finished
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/GamesResponse"
    post:
      operationId: createGame
      requestBody:
        description: A new game
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createGame"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
        "404":
          description: not found
  /games/{gameId}:
    get:
      operationId: getGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          $ref: "#/components/responses/GameResponse"
        "404":
          description: not found
    post:
      operationId: gameEvent
      parameters:
        - $ref: "#/components/parameters/gameId"
      requestBody:
        $ref: "#/components/requestBodies/gameEventRequest"
      responses:
        "200":
          description: ok
        "422":
          description: some application error
        "404":
          description: not found

    delete:
      operationId: deleteGame
      parameters:
        - $ref: "#/components/parameters/gameId"
      responses:
        "200":
          description: ok
  /users/multiple/{userIds}:
    get:
      operationId: getUserByIds
      parameters:
        - $ref: "#/components/parameters/multipleUserId"
      responses:
        "200":
          $ref: "#/components/responses/UsersResponse"
  /ping:
    post:
      operationId: ping
      requestBody:
        $ref: "#/components/requestBodies/pingPongRequestBody"
      responses:
        "200":
          description: ok
  /pong:
    post:
      operationId: pong
      requestBody:
        $ref: "#/components/requestBodies/pingPongRequestBody"
      responses:
        "200":
          description: ok
  /users/updatePreferences:
    post:
      operationId: updatePreferences
      requestBody:
        $ref: "#/components/requestBodies/updatePreferences"
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
  /users/single/{userId}:
    get:
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
        "404":
          description: not found
  /users/invites:
    get:
      operationId: getInvites
      responses:
        "200":
          $ref: "#/components/responses/InvitesResponse"
    post:
      operationId: createInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createInvite"
      responses:
        "200":
          $ref: "#/components/responses/CreateInvitesResponse"
        "404":
          description: not found
  /users/invites/{userId}:
    delete:
      operationId: removeInvite
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: ok
        "404":
          description: not found
    post:
      operationId: acceptInvite
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: ok
        "404":
          description: not found
  /users/message:
    post:
      operationId: usersMessage
      requestBody:
        $ref: "#/components/requestBodies/postMessage"
      responses:
        "200":
          description: ok
components:
  requestBodies:
    sayRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/playerSay"
    gameEventRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GameEvent"
    card:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/card"
    updatePreferences:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/updatePreferences"
    pingPongRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/pingPongSchema"
    postMessage:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/postMessage"
  parameters:
    gameId:
      name: gameId
      in: path
      schema:
        type: string
      required: true
    sessionIdentifier:
      name: sessionIdentifier
      in: path
      schema:
        type: string
      required: true
    boomId:
      name: boomId
      in: path
      schema:
        type: string
      required: true
    userId:
      name: userId
      in: path
      schema:
        type: string
      required: true
    multipleUserId:
      name: userIds
      in: path
      schema:
        type: array
        items:
          type: string
        uniqueItems: true
      required: true
  securitySchemes:
    openId:
      type: openIdConnect
      scheme: bearer
      bearerFormat: JWT
      openIdConnectUrl: https://accounts.google.com/.well-known/openid-configuration
  responses:
    GameResponse:
      description: a game
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Game"
    UserResponse:
      description: a user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"
    BoomsResponse:
      description: all booms
      content:
        application/json:
          schema:
            type: object
            properties:
              booms:
                type: array
                items:
                  type: string
    GamesResponse:
      description: all games
      content:
        application/json:
          schema:
            type: object
            properties:
              games:
                type: array
                items:
                  type: string
    UsersResponse:
      description: users
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/User"
    SseConnectionsResponse:
      description: sse connnection response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/sseConnections"
    LoginResponse:
      description: login response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/loginResponse'
    LoadUserResponse:
      description: load user response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"
    CreateInvitesResponse:
      description: response for create invites
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/createInviteResponse'
    InvitesResponse:
      description: incoming invites response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/invitesResponse'

  schemas:
    Boom:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the test
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
        creator:
          description: initial dealer
          type: string
        dealer:
          type: integer
          minimum: 0
          maximum: 3
        players:
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: string
        games:
          type: array
          maxItems: 32
          items:
            type: string
        gameVariant:
          $ref: '#/components/schemas/GameVariant'
        aiRisc:
          $ref: "#/components/schemas/AiRisc"
      required:
        - id
        - created
        - updated
        - creator
        - dealer
        - players
        - games
        - gameVariant
        - aiRisc
    CreateBoom:
      type: object
      properties:
        players:
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: string
      required:
        - players
    UserMessage:
      type: object
      properties:
        userId:
          type: string
        message:
          type: string
        variant:
          enum:
            - error
            - warning
            - info
            - success
      required:
        - userId
        - message
        - variant
    sseConnections:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: '#/components/schemas/SseConnection'
        timeStamp:
          type: string
          format: date-time
      required:
        - connections
        - currentSubscriberCount
        - timeStamp
    loginResponse:
      type: object
      properties:
        jwt:
          type: string
          format: password
        user:
          $ref: '#/components/schemas/User'
      required:
        - jwt
        - user
    createInviteResponse:
      type: object
      properties:
        count:
          type: number
      required:
        - count
    invitesResponse:
      type: object
      properties:
        incoming:
          description: unaccepted incoming
          type: array
          items:
            type: string
        outgoing:
          description: unaccepted outgoing
          type: array
          items:
            type: string
        friends:
          description: accepted, friends
          type: array
          items:
            type: string
    playerSay:
      type: object
      properties:
        say:
          type: boolean
      required:
        - say
    card:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/Card"
      required:
        - card
    createInvite:
      type: object
      properties:
        searchString:
          type: string
          minLength: 5
          maxLength: 255
      required:
        - searchString
    postMessage:
      type: object
      properties:
        recipients:
          type: array
          items:
            type: string
          uniqueItems: true
        message:
          type: string
      required:
        - recipients
        - message
    pingPongSchema:
      type: object
      properties:
        appIdentifier:
          type: string
      required:
        - appIdentifier
    updatePreferences:
      type: object
      properties:
        displayName:
          type: string
        skipAnimation:
          type: boolean
        gameVariant:
          $ref: '#/components/schemas/GameVariant'
        screenOrientation:
          $ref: '#/components/schemas/ScreenOrientation'
        theme:
          $ref: '#/components/schemas/Theme'
        aiRisc:
          $ref: '#/components/schemas/AiRisc'
        autoKnock:
          type: boolean
      required:
        - displayName
        - skipAnimation
        - gameVariant
        - screenOrientation
        - theme
        - aiRisc
        - autoKnock
    createGame:
      type: object
      properties:
        players:
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: string
      required:
        - players
    HelloEvent:
      type: object
      properties:
        hostName:
          type: string
        appIdentifier:
          type: string
      required:
        - hostName
        - appIdentifier
    OnlineListEvent:
      type: object
      properties:
        onlineList:
          type: array
          items:
            type: string
      required:
        - onlineList
    SseConnection:
      type: object
      properties:
        id:
          type: string
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
        creator:
          type: string
        pingReceived:
          type: string
          format: date-time
        pingReceivedCount:
          type: integer
        pongReceived:
          type: string
          format: date-time
        pongReceivedCount:
          type: integer
        remoteAddress:
          type: string
        userAgent:
          type: string
        host:
          type: string
      required:
        - id
        - created
        - creator
        - applicationIdentifier
        - pingReceivedCount
        - pongReceivedCount
        - remoteAddress
        - userAgent
        - host
    NewGameEvent:
      type: object
      properties:
        gameId:
          type: string
        creator:
          type: string
      required:
        - gameId
        - creator
    # 1. The Polymorphic Wrapper/Container
    GameEvent:
      type: object
      oneOf:
        - $ref: '#/components/schemas/PlayCardEvent'
        - $ref: '#/components/schemas/OpenLastTrickEvent'
        - $ref: '#/components/schemas/CloseLastTrickEvent'
        - $ref: '#/components/schemas/ClaimRoemEvent'
        - $ref: '#/components/schemas/MakeEvent'
        - $ref: '#/components/schemas/PassEvent'
      discriminator:
        propertyName: eventType
        mapping:
          play_card: '#/components/schemas/PlayCardEvent'
          open_last_trick: '#/components/schemas/OpenLastTrickEvent'
          close_last_trick: '#/components/schemas/CloseLastTrickEvent'
          claim_roem: '#/components/schemas/ClaimRoemEvent'
          make: '#/components/schemas/MakeEvent'
          pass: '#/components/schemas/PassEvent'

    # 2. The Abstract Base Schema (Inheritance via allOf)
    BaseGameEvent:
      type: object
      required:
        - eventType
      properties:
        eventType:
          type: string

    # 3. Concrete Event Specification A: User Signup
    PlayCardEvent:
      allOf:
        - $ref: '#/components/schemas/BaseGameEvent'
        - type: object
          required:
            - eventType
            - card
          properties:
            eventType:
              type: string
              default: play_card
            card:
              $ref: '#/components/schemas/Card'

    # 4. Concrete Event Specification B: Resource Allocation
    OpenLastTrickEvent:
      allOf:
        - $ref: '#/components/schemas/BaseGameEvent'
        - type: object
          required:
            - eventType
          properties:
            eventType:
              type: string
              default: open_last_trick
    CloseLastTrickEvent:
      allOf:
        - $ref: '#/components/schemas/BaseGameEvent'
        - type: object
          required:
            - eventType
          properties:
            eventType:
              type: string
              default: close_last_trick
    ClaimRoemEvent:
      allOf:
        - $ref: '#/components/schemas/BaseGameEvent'
        - type: object
          required:
            - eventType
          properties:
            eventType:
              type: string
              default: claim_roem
    MakeEvent:
      allOf:
        - $ref: '#/components/schemas/BaseGameEvent'
        - type: object
          required:
            - eventType
          properties:
            eventType:
              type: string
              default: make
    PassEvent:
      allOf:
        - $ref: '#/components/schemas/BaseGameEvent'
        - type: object
          required:
            - eventType
          properties:
            eventType:
              type: string
              default: pass
